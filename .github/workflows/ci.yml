name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Ensure Electron binary is installed
        run: ELECTRON_CACHE="$PWD/.electron-cache" node node_modules/electron/install.js

      - name: Build
        run: npm run build
